name: Check Extension

on:
  push:
    branches:
      - master
    paths:
      - src/vsstubs-vscode/**
      - .github/workflows/vscode-check.yml
  pull_request:
    paths:
      - src/vsstubs-vscode/**
      - .github/workflows/vscode-check.yml
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: src/vsstubs-vscode/package-lock.json

      - name: Install Dependencies
        working-directory: src/vsstubs-vscode
        run: npm install

      - name: Lint and Type Check
        working-directory: src/vsstubs-vscode
        run: npm run compile
