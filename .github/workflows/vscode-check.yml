name: Check Extension

on:
  push:
    branches:
      - master
    paths:
      - src/vsstubs-vscode/**
      - .github/workflows/vscode-check.yml
  pull_request:
    paths:
      - src/vsstubs-vscode/**
      - .github/workflows/vscode-check.yml
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: src/vsstubs-vscode/package-lock.json

      - name: Install Dependencies
        working-directory: src/vsstubs-vscode
        run: npm install

      - name: Lint and Type Check
        working-directory: src/vsstubs-vscode
        run: npm run compile
